# Relative paths are resolved from this config file's directory.
# Omit `target` (or set it to null) to use the built-in demo target.

target: null
output_dir: ../outputs/sac
image_size: 64
# Optional overrides; if only one is set, the other mirrors it.
image_width: null
image_height: null
max_steps: 200
total_timesteps: 10000
buffer_size: 10000
reward_scale: 1000.0
seed: 0
# Save a canvas snapshot every N completed episodes. Set to 0 to disable.
snapshot_interval: 10
check_env: false
# PyTorch device for SAC (auto, cpu, cuda, cuda:0, cuda:1, ...)
device: auto
